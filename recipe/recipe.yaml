context:
  version: "0.18.4"

package:
  name: arethetypeswrong-cli
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@arethetypeswrong/cli/-/cli-${{ version }}.tgz
  sha256: 6b842ed92f509443f86ab9701aeaa74bb5e6c67ea3f0ab890a16fb7c449b4e76

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - attw --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: A CLI tool for arethetypeswrong.github.io
  homepage: https://github.com/arethetypeswrong/arethetypeswrong.github.io
  repository: https://github.com/arethetypeswrong/arethetypeswrong.github.io

extra:
  recipe-maintainers:
    - danielnachun
